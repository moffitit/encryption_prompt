<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Encrypt Email</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle background glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,120,212,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 90%, rgba(0,120,212,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 340px;
      padding: 32px 28px 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      text-align: center;
      backdrop-filter: blur(12px);
      animation: rise 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .icon-wrap {
      width: 52px;
      height: 52px;
      margin: 0 auto 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0078d4 0%, #106ebe 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(0,120,212,0.35);
    }

    .icon-wrap svg {
      width: 26px;
      height: 26px;
      fill: white;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      color: #f0f0f0;
      margin-bottom: 8px;
      letter-spacing: -0.01em;
    }

    p {
      font-size: 12.5px;
      color: rgba(240,240,240,0.5);
      line-height: 1.55;
      margin-bottom: 24px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 11px 0;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s, box-shadow 0.15s;
      letter-spacing: 0.01em;
    }

    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #btnYes {
      background: linear-gradient(135deg, #0078d4, #106ebe);
      color: #fff;
      box-shadow: 0 4px 14px rgba(0,120,212,0.4);
    }
    #btnYes:hover:not(:disabled) {
      box-shadow: 0 6px 20px rgba(0,120,212,0.55);
    }

    #btnNo {
      background: rgba(255,255,255,0.07);
      color: rgba(240,240,240,0.75);
      border: 1px solid rgba(255,255,255,0.1);
    }
    #btnNo:hover:not(:disabled) {
      background: rgba(255,255,255,0.11);
      color: #f0f0f0;
    }

    .status {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(240,240,240,0.45);
      min-height: 18px;
      transition: color 0.2s;
    }
    .status.ok  { color: #6bcb77; }
    .status.err { color: #ff6b6b; }

    .lock-anim .icon-wrap {
      animation: lockpulse 0.5s ease-in-out;
    }
    @keyframes lockpulse {
      0%,100% { transform: scale(1); box-shadow: 0 8px 24px rgba(0,120,212,0.35); }
      50%      { transform: scale(1.12); box-shadow: 0 12px 32px rgba(0,120,212,0.6); }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5L12 1zm-1 14H9l3-8 3 8h-2l-.5-1.5h-3L11 15zm.5-3h2l-1-3-1 3z"/>
      </svg>
    </div>

    <h1>Does this email need to be encrypted?</h1>
    <p>Send with Microsoft Purview OME to protect sensitive or confidential content.</p>

    <div class="btn-row">
      <button id="btnYes" onclick="choose('yes')">🔒 Yes, Encrypt</button>
      <button id="btnNo"  onclick="choose('no')">No Thanks</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    Office.onReady(function() {});

    function choose(answer) {
      document.getElementById('btnYes').disabled = true;
      document.getElementById('btnNo').disabled  = true;

      if (answer === 'yes') {
        document.getElementById('card').classList.add('lock-anim');
        document.getElementById('status').textContent = 'Applying encryption…';
        document.getElementById('status').className = 'status';
        setTimeout(function() {
          Office.context.ui.messageParent('encrypt');
        }, 500);
      } else {
        document.getElementById('status').textContent = 'Sending without encryption.';
        setTimeout(function() {
          Office.context.ui.messageParent('skip');
        }, 400);
      }
    }
  </script>
</body>
</html>
